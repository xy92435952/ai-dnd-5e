<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 背景：深色圆形盾牌 -->
  <circle cx="32" cy="32" r="30" fill="#1a1207" stroke="#c9a84c" stroke-width="2.5"/>
  <circle cx="32" cy="32" r="26" fill="none" stroke="#8b6914" stroke-width="1" opacity="0.4"/>

  <!-- d20 多面体轮廓 -->
  <polygon points="32,6 54,22 48,50 16,50 10,22" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linejoin="round"/>

  <!-- 内部三角面线条 -->
  <line x1="32" y1="6" x2="16" y2="50" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="6" x2="48" y2="50" stroke="#8b6914" stroke-width="1" opacity="0.5"/>
  <line x1="10" y1="22" x2="48" y2="50" stroke="#8b6914" stroke-width="0.8" opacity="0.3"/>
  <line x1="54" y1="22" x2="16" y2="50" stroke="#8b6914" stroke-width="0.8" opacity="0.3"/>

  <!-- 中心数字 20（大成功！）-->
  <text x="32" y="33" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="20" font-weight="900" fill="#f0d060">20</text>
</svg>
