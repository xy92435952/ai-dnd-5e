name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (smoke + unit + integration)
        working-directory: backend
        env:
          # CI does not use a real LLM key; AI calls are mocked by conftest.
          LLM_API_KEY: ci-dummy
          JWT_SECRET: ci-test-secret-at-least-32-bytes-long
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify OpenAPI schema is up-to-date
        working-directory: backend
        env:
          LLM_API_KEY: ci-dummy
          JWT_SECRET: ci-test-secret-at-least-32-bytes-long
        run: |
          python scripts/export_openapi.py
          git diff --exit-code openapi.json || (echo "openapi.json is stale; run python scripts/export_openapi.py locally and commit the result" && exit 1)

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Verify api.d.ts matches openapi.json
        working-directory: frontend
        run: |
          npm run types:api
          git diff --exit-code src/types/api.d.ts || (echo "src/types/api.d.ts is stale; run npm run types:api locally and commit the result" && exit 1)

      - name: Run vitest
        working-directory: frontend
        run: npm test

      - name: Build (full deps)
        working-directory: frontend
        run: npm run build

  # Production deploy guard: prove the frontend still builds after installing
  # production dependencies only. This catches accidental dev-only imports in
  # build-time config before deployment scripts run with `npm ci --omit=dev`.
  frontend-prod-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install prod-only deps (--omit=dev)
        working-directory: frontend
        run: npm ci --omit=dev

      - name: Build (prod-only deps)
        working-directory: frontend
        run: npm run build
