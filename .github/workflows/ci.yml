name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest (smoke + unit + integration)
        working-directory: backend
        env:
          # CI 环境不配真实 LLM；所有 AI 调用由 conftest mock
          LLM_API_KEY: ci-dummy
          JWT_SECRET: ci-test-secret-at-least-32-bytes-long
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify OpenAPI schema is up-to-date
        working-directory: backend
        env:
          LLM_API_KEY: ci-dummy
          JWT_SECRET: ci-test-secret-at-least-32-bytes-long
        run: |
          python scripts/export_openapi.py
          git diff --exit-code openapi.json || (echo "❌ openapi.json 已过时，请本地跑 python scripts/export_openapi.py 并 commit" && exit 1)

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Verify api.d.ts matches openapi.json
        working-directory: frontend
        run: |
          npm run types:api
          git diff --exit-code src/types/api.d.ts || (echo "❌ src/types/api.d.ts 已过时，请本地跑 npm run types:api 并 commit" && exit 1)

      - name: Run vitest (前端 hook 单测)
        working-directory: frontend
        run: npm test

      - name: Build (full deps —— dev + prod)
        working-directory: frontend
        run: npm run build

  # 生产部署兜底：模拟 `npm install --omit=dev` 后能 build。
  # 痛点回忆：vite.config.js 曾经 `import 'vitest/config'`，本地 / 上面那个 frontend job
  # 都过得了（dev deps 已装），但腾讯云 update 脚本用 --omit=dev 直接 ERR_MODULE_NOT_FOUND。
  # 这个 job 就是把那种坑挡在 PR 阶段。
  frontend-prod-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install prod-only deps (--omit=dev)
        working-directory: frontend
        run: npm ci --omit=dev

      - name: Build (prod-only deps)
        working-directory: frontend
        run: npm run build
