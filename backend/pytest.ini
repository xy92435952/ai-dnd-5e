[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 静音 pydantic v1 在 python 3.14 的弃用告警（langchain 的遗留依赖）
filterwarnings =
    ignore::UserWarning:langchain_core._api.deprecation
    ignore::DeprecationWarning
addopts = -ra --strict-markers
markers =
    slow: 标记为慢测试（如需真实 LLM）
    integration: 集成测试（需要完整 app 启动）
